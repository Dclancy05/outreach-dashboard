# Config for tmux sessions spawned by terminal-server.
#
# - 50,000 lines of scrollback so a closed-laptop-overnight reconnect still
#   sees the full history (default tmux is only 2,000 — way too small).
# - destroy-unattached off so a session stays alive when the last client
#   disconnects; that's the whole point of the persistent-terminal feature.
# - mouse on so xterm.js scrollwheel + selection reach tmux.
# - escape-time 0 so meta keys pass through the bridge PTY without lag.

set -g history-limit 50000
set -g destroy-unattached off
set -g mouse on
set -g default-terminal "xterm-256color"
set -sg escape-time 0
set -g status off
