# Config for tmux sessions spawned by terminal-server.
#
# - 50,000 lines of scrollback so a closed-laptop-overnight reconnect still
#   sees the full history (default tmux is only 2,000 — way too small).
# - destroy-unattached off so a session stays alive when the last client
#   disconnects; that's the whole point of the persistent-terminal feature.
# - mouse on so xterm.js scrollwheel + selection reach tmux.
# - escape-time 0 so meta keys pass through the bridge PTY without lag.

set -g history-limit 50000
set -g destroy-unattached off
set -g mouse on
set -g default-terminal "xterm-256color"
set -sg escape-time 0
set -g status off

# Wheel scrolling MUST NOT enter tmux copy-mode. Default tmux behavior
# binds WheelUp/Down on the root key table to enter copy-mode when the
# focused program isn't doing its own mouse tracking — and copy-mode is
# a full-screen modal viewer (arrow keys move a position cursor, typing
# is swallowed, only q/Esc exits). With `status off` above, there's no
# visual cue the user is stuck in it. Unbind both so wheel events stay
# raw: Claude Code (mouse-tracking alt buffer) still receives them and
# scrolls its own history; plain shells get nothing on wheel, which is
# fine — xterm.js has its own scrollback for the normal buffer.
unbind-key -T root WheelUpPane
unbind-key -T root WheelDownPane
