name: Ban-Risk Smoke

# Catches the 2026-05-02-class regression: any setInterval polling
# /api/platforms/* or /api/recordings/* on a tight timer that drives Chrome
# to navigate. Runs scripts/ban-risk-smoke.mjs against the Vercel preview.
#
# NOTE: Vercel previews on this org are SSO-gated (per memory
# reference_vercel_preview_sso.md). The wait-for-vercel-preview action
# can't find a public preview URL, so this workflow currently runs
# against the live alias as a fallback. Re-enable preview-mode once
# Vercel team-level Auth is bypassed for this repo.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    # Non-blocking: the live-alias smoke catches structural regressions
    # but a real preview run is the gold standard. Until SSO is bypassed,
    # we don't want this to block merges to main.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm i playwright@1.49.x --no-save
          npx playwright install --with-deps chromium

      # Smoke against the live alias — the preview SSO gate blocks the
      # patrickedqvist/wait-for-vercel-preview path. When SSO is bypassed,
      # swap this for the wait-for-vercel-preview step.
      - name: Run idle-smoke against live alias
        env:
          DASHBOARD_URL: https://outreach-github.vercel.app
          ADMIN_PIN: ${{ secrets.ADMIN_PIN }}
          IDLE_SECONDS: 60
        run: node scripts/ban-risk-smoke.mjs
